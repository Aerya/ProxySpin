services:
  proxyspin:
    image: ghcr.io/aerya/proxyspin:latest
    container_name: proxyspin
    restart: always
    ports:
      - 1973:1973 # Proxy rotatif
      - 1974:1974 # Web UI + API de contrôle
      # - 1976:1976 # HAProxy stats (désactivé par défaut — décommenter pour activer)
    environment:
      # ── Rotation (Tor uniquement — désactivée automatiquement en mode proxy/local) ──
      - ROTATION_INTERVAL=60 # secondes
      # ── Tor ──
      - tors=10 # nombre d'instances Tor
      # ── Free proxy ──
      - MAX_PROXIES=20 # proxies gratuits à conserver
      # ── Auth proxy port 1973 ──
      - PROXY_USER=monuser
      - PROXY_PASS=changeme
      # ── Auth stats port 1976 ──
      - STATS_USER=admin
      - STATS_PASS=changeme
      # ── Désactivation auth (mettre 'false' pour désactiver) ──
      # - PROXY_AUTH_ENABLED=false  # port 1973 — proxy rotatif
      # - API_AUTH_ENABLED=false    # port 1974 — Web UI + API
      # - STATS_AUTH_ENABLED=false  # port 1976 — HAProxy stats
      # ── Filtre pays optionnel (modes 'proxy' et 'local') ──
      # - COUNTRY_FILTER=FR
    volumes:
      # Répertoire de données persistantes :
      #   data/*.txt        — listes de proxies locaux (mode 'local')
      #   data/sources.json — sources personnalisées (mode 'proxy')
      - ./data:/data
    logging:
      driver: json-file
      options:
        max-size: 16m
        max-file: "5"
