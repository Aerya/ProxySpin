name: Docker — linux/arm64

on:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    # Décalé de 30 min par rapport à l'amd64 pour éviter la concurrence sur le cache GHA
    - cron: '30 3 * * 1'  # Lundi 3h30 UTC
  workflow_dispatch:

env:
  IMAGE: ghcr.io/aerya/proxyspin

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest-arm64,enable={{is_default_branch}}
            type=semver,pattern={{version}},suffix=-arm64
            type=semver,pattern={{major}}.{{minor}},suffix=-arm64

      - name: Set up QEMU (émulation ARM)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Étape 1 : build local (pas de push) pour pouvoir lancer le smoke test
      - name: Build (local)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          load: true
          tags: proxyspin:smoke-arm64
          cache-from: type=gha,scope=arm64
          cache-to:   type=gha,scope=arm64,mode=max

      # Étape 2 : smoke test via QEMU (binfmt_misc actif grâce à setup-qemu-action)
      - name: Smoke test
        run: |
          docker run --rm \
            -e PROXY_USER=ci \
            -e PROXY_PASS=ci \
            -e STATS_USER=ci \
            -e STATS_PASS=ci \
            proxyspin:smoke-arm64 \
            python3 /usr/local/bin/start.py --check

      # Étape 3 : push uniquement si le smoke test est passé (cache → quasi-instantané)
      - name: Push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=arm64
