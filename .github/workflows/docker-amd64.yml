name: Docker — linux/amd64

on:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    # Rebuild hebdomadaire — récupère automatiquement les dernières versions
    # de Tor, Privoxy et HAProxy depuis leurs dépôts apt
    - cron: '0 3 * * 1'   # Lundi 3h UTC
  workflow_dispatch:

env:
  IMAGE: ghcr.io/aerya/proxyspin

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest-amd64,enable={{is_default_branch}}
            type=semver,pattern={{version}},suffix=-amd64
            type=semver,pattern={{major}}.{{minor}},suffix=-amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Étape 1 : build local (pas de push) pour pouvoir lancer le smoke test
      - name: Build (local)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: proxyspin:smoke-amd64
          cache-from: type=gha,scope=amd64
          cache-to:   type=gha,scope=amd64,mode=max

      # Étape 2 : smoke test — vérifie que tor/privoxy/haproxy sont bien installés
      - name: Smoke test
        run: |
          docker run --rm \
            -e PROXY_USER=ci \
            -e PROXY_PASS=ci \
            -e STATS_USER=ci \
            -e STATS_PASS=ci \
            proxyspin:smoke-amd64 \
            python3 /usr/local/bin/start.py --check

      # Étape 3 : push uniquement si le smoke test est passé (cache → quasi-instantané)
      - name: Push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=amd64
