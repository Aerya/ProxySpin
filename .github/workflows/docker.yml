name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    # Rebuild hebdomadaire — récupère automatiquement les dernières versions
    # de Tor, Privoxy et HAProxy depuis leurs dépôts apt
    - cron: '0 3 * * 1'   # Lundi 3h UTC
  workflow_dispatch:

env:
  IMAGE: ghcr.io/aerya/proxyspin

jobs:

  # ── Build amd64 ──────────────────────────────────────────────────────────────
  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Étape 1 : build local pour le smoke test
      - name: Build (local)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: proxyspin:smoke-amd64
          cache-from: type=gha,scope=amd64
          cache-to:   type=gha,scope=amd64,mode=max

      # Étape 2 : smoke test
      - name: Smoke test
        run: |
          docker run --rm \
            -e PROXY_USER=ci \
            -e PROXY_PASS=ci \
            -e STATS_USER=ci \
            -e STATS_PASS=ci \
            proxyspin:smoke-amd64 \
            python3 /usr/local/bin/start.py --check

      # Étape 3 : push si smoke test OK
      - name: Push latest-amd64
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest-amd64
          labels: org.opencontainers.image.source=https://github.com/Aerya/ProxySpin
          cache-from: type=gha,scope=amd64

  # ── Build arm64 ──────────────────────────────────────────────────────────────
  build-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (émulation ARM)
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Étape 1 : build local pour le smoke test
      - name: Build (local)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          load: true
          tags: proxyspin:smoke-arm64
          cache-from: type=gha,scope=arm64
          cache-to:   type=gha,scope=arm64,mode=max

      # Étape 2 : smoke test via QEMU
      - name: Smoke test
        run: |
          docker run --rm \
            -e PROXY_USER=ci \
            -e PROXY_PASS=ci \
            -e STATS_USER=ci \
            -e STATS_PASS=ci \
            proxyspin:smoke-arm64 \
            python3 /usr/local/bin/start.py --check

      # Étape 3 : push si smoke test OK
      - name: Push latest-arm64
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest-arm64
          labels: org.opencontainers.image.source=https://github.com/Aerya/ProxySpin
          cache-from: type=gha,scope=arm64

  # ── Manifest multi-arch (latest) ─────────────────────────────────────────────
  manifest:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create multi-arch manifest :latest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE }}:latest \
            ${{ env.IMAGE }}:latest-amd64 \
            ${{ env.IMAGE }}:latest-arm64

      - name: Inspect manifest
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:latest
